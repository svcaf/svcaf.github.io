{{- if .IsHome }}
<script>
/* Hero carousel */
(function() {
  var carousel = document.getElementById('heroCarousel');
  if (!carousel) return;
  var slides = carousel.querySelectorAll('.slide');
  var dotsEl = document.getElementById('carouselDots');
  var current = 0;
  var timer;

  slides.forEach(function(_, i) {
    var d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Slide ' + (i + 1));
    d.addEventListener('click', function() { goTo(i); resetTimer(); });
    dotsEl.appendChild(d);
  });

  function goTo(n) {
    slides[current].classList.remove('active');
    dotsEl.children[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dotsEl.children[current].classList.add('active');
  }

  window.carouselMove = function(dir) { goTo(current + dir); resetTimer(); };

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(function() { goTo(current + 1); }, 5000);
  }

  resetTimer();
})();
</script>
{{- end }}

{{- if eq .RelPermalink "/gallery/" }}
<script>
/* Photo Gallery Lightbox */
var galleryPhotos = [];
document.querySelectorAll('.gallery-item').forEach(function(item, i) {
  var img = item.querySelector('img');
  var cap = item.querySelector('.gallery-caption-overlay');
  galleryPhotos.push({ src: img.src, caption: item.getAttribute('data-caption') || (cap ? cap.textContent.trim() : '') });
  item.setAttribute('data-index', i);
  item.addEventListener('click', function() { openLightbox(parseInt(this.getAttribute('data-index'))); });
});
var lbCurrent = 0;
function openLightbox(index) {
  lbCurrent = index; updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
function shiftLightbox(dir) {
  lbCurrent = (lbCurrent + dir + galleryPhotos.length) % galleryPhotos.length;
  updateLightbox();
}
function updateLightbox() {
  var p = galleryPhotos[lbCurrent];
  document.getElementById('lightbox-img').src = p.src;
  document.getElementById('lightbox-caption').textContent = p.caption;
  document.getElementById('lightbox-counter').textContent = (lbCurrent + 1) + ' / ' + galleryPhotos.length;
}
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') shiftLightbox(-1);
  if (e.key === 'ArrowRight') shiftLightbox(1);
});
window.openLightbox = openLightbox;
window.closeLightbox = closeLightbox;
window.shiftLightbox = shiftLightbox;
</script>
{{- end }}

{{- if (or .IsHome (eq .Kind "section")) }}
<script>
/* Infinite scroll */
(function() {
  var postList = document.querySelector('main.main');
  if (!postList) return;

  var pageFooter = document.querySelector('.page-footer');
  if (pageFooter) pageFooter.style.display = 'none';

  var nextUrl = null;
  var loading = false;
  var done = false;

  var nextLink = document.querySelector('.pagination .next');
  if (nextLink) nextUrl = nextLink.href;
  if (!nextUrl) return;

  var sentinel = document.createElement('div');
  sentinel.id = 'scroll-sentinel';
  sentinel.style.height = '80px';
  postList.appendChild(sentinel);

  function loadMore() {
    if (loading || done || !nextUrl) return;
    loading = true;

    fetch(nextUrl)
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var articles = doc.querySelectorAll('article.post-entry, article.first-entry');

        articles.forEach(function(article) {
          article.classList.remove('first-entry');
          article.classList.add('post-entry');
          postList.insertBefore(article, sentinel);
        });

        var nextNext = doc.querySelector('.pagination .next');
        nextUrl = nextNext ? nextNext.href : null;
        if (!nextUrl) done = true;
        loading = false;
      })
      .catch(function() { loading = false; });
  }

  var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: '200px' });

  observer.observe(sentinel);
})();
</script>
{{- end }}
