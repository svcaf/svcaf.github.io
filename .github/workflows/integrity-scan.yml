name: Site Integrity Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 10 * * 1'   # Every Monday 10am UTC
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  integrity-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run integrity scan
        run: python scripts/integrity-scan.py --report

      - name: Post summary
        if: always()
        run: |
          if [ -f integrity-report.md ]; then
            echo "### 🔍 Site Integrity Scan" >> $GITHUB_STEP_SUMMARY
            cat integrity-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-report-${{ github.run_number }}
          path: integrity-report.md
