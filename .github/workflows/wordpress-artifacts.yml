name: Content Artifact Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-wordpress-artifacts:
    runs-on: ubuntu-latest
    name: Check for WordPress CSS/HTML artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for WordPress artifacts
        run: |
          echo "Scanning posts and pages for WordPress leftover artifacts..."

          FAIL=0

          # Pattern 1: Bare CSS rules (WordPress classic editor leakage)
          CSS_FILES=$(grep -rl \
            -e 'a:link\s*{' \
            -e 'list-style-type:\s*disc' \
            -e 'padding-left:\s*40px' \
            -e 'margin-top:\s*[0-9]*em' \
            content/posts/ content/pages/ 2>/dev/null || true)

          if [ -n "$CSS_FILES" ]; then
            echo "❌ WordPress CSS artifacts found in:"
            echo "$CSS_FILES"
            FAIL=1
          fi

          # Pattern 2: Inline <style> blocks in content files
          STYLE_FILES=$(grep -rl '<style' content/posts/ content/pages/ 2>/dev/null || true)
          if [ -n "$STYLE_FILES" ]; then
            echo "❌ Inline <style> blocks found in:"
            echo "$STYLE_FILES"
            FAIL=1
          fi

          # Pattern 3: WordPress shortcodes e.g. [caption], [gallery], [embed]
          SC_FILES=$(grep -rlP '\[caption\b|\[gallery\b|\[embed\b|\[/caption\]|\[/gallery\]' \
            content/posts/ content/pages/ 2>/dev/null || true)
          if [ -n "$SC_FILES" ]; then
            echo "❌ WordPress shortcodes found in:"
            echo "$SC_FILES"
            FAIL=1
          fi

          # Pattern 4: WordPress upload absolute URLs (old domain)
          WP_URLS=$(grep -rl 'https\?://www\.svcaf\.org/wp-content/' \
            content/posts/ content/pages/ 2>/dev/null || true)
          if [ -n "$WP_URLS" ]; then
            echo "❌ Hardcoded WordPress upload URLs found in:"
            echo "$WP_URLS"
            FAIL=1
          fi

          # Pattern 5: WeChat platform JavaScript (scraped from mp.weixin.qq.com)
          WECHAT_FILES=$(grep -rl \
            -e 'WeixinJSBridge' \
            -e 'mmbizwap' \
            -e 'wx\.qq\.com' \
            -e 'var first_sceen__time' \
            -e 'window\.moon_map' \
            -e '__appmsgCgiData' \
            -e 'window\.wxtoken' \
            -e 'appmsg/index\.js' \
            content/posts/ content/pages/ 2>/dev/null || true)

          if [ -n "$WECHAT_FILES" ]; then
            echo "❌ WeChat platform JavaScript found in:"
            echo "$WECHAT_FILES"
            FAIL=1
          fi

          # Pattern 6: WeChat UI elements (reward/QR code widgets)
          WECHAT_UI=$(grep -rl \
            -e '长按二维码向我转账' \
            -e 'res\.wx\.qq\.com' \
            -e 'mmbiz\.qpic\.cn' \
            content/posts/ content/pages/ 2>/dev/null || true)

          if [ -n "$WECHAT_UI" ]; then
            echo "❌ WeChat UI elements (QR code/reward widgets) found in:"
            echo "$WECHAT_UI"
            FAIL=1
          fi

          if [ $FAIL -eq 0 ]; then
            echo "✅ No WordPress or WeChat artifacts found."
          else
            echo ""
            echo "Fix: Remove the flagged CSS/JS/shortcodes/WeChat code before merging."
            exit 1
          fi
      - name: "Notify Discord on failure"
        if: failure()
        run: |
          curl -s -X POST "https://discord.com/api/webhooks/1487903449872990248/AzFCJkNwvaxDOlapbJk58rGowgkoMpFA7XQCzwY7_CGzd5vYVHLXkGz6QkKFJcXquQYw" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 **GitHub CI FAILED**\\n**Workflow:** ${{ github.workflow }}\\n**Commit:** \`$(echo ${{ github.sha }} | cut -c1-7)\` — ${{ github.event.head_commit.message }}\\n**Logs:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
